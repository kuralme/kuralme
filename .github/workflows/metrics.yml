name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  push:
    branches: ["main"]
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Isometric Calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.STATS_CARD_TOKEN }}
          filename: metrics-isocalendar.svg
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

      - name: Starred Topics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.STATS_CARD_TOKEN }}
          filename: metrics-stars.svg
          base: ""
          plugin_stars: yes
          plugin_stars_limit: 10
