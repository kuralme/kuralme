name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  push:
    branches: ["main"]
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Full Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.STATS_CARD_TOKEN }}
          user: username=${{ github.repository_owner }}
          template: classic
          base: ""
          
          # Isometric Calendar Configuration
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          
          # Starred Topics Configuration
          plugin_stars: yes
          plugin_stars_limit: 10
          
          filename: github-metrics.svg
